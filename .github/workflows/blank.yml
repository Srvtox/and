name: Build Android SDK (Latest)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip zip openjdk-17-jdk wget

    - name: Download latest Android cmdline-tools
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk

        echo "Downloading latest Android command line tools..."
        wget https://dl.google.com/android/repository/commandlinetools-linux-latest.zip -O tools.zip

        unzip tools.zip
        mv cmdline-tools latest
        mkdir -p cmdline-tools
        mv latest cmdline-tools/

    - name: Install latest SDK packages
      env:
        ANDROID_HOME: ${{ env.HOME }}/android-sdk
        PATH: ${{ env.HOME }}/android-sdk/cmdline-tools/latest/bin:${{ env.PATH }}
      run: |
        echo "Check sdkmanager location:"
        which sdkmanager

        yes | sdkmanager --licenses
        sdkmanager --update

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    - name: Compress SDK
      run: |
        cd $HOME
        tar -czf android-sdk-linux-latest.tar.gz android-sdk
        ls -lh android-sdk-linux-latest.tar.gz

    - name: Upload Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: android-sdk-linux-latest
        name: Android SDK Linux Latest
        files: $HOME/android-sdk-linux-latest.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
