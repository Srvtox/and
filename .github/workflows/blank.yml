name: Build Android SDK (Fixed Version)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip zip openjdk-17-jdk wget

    - name: Download fixed Android cmdline-tools
      run: |
        mkdir -p $HOME/android-sdk/cmdline-tools
        cd $HOME/android-sdk

        echo "Downloading Android command line tools (version 9477386)..."
        # Using a fixed, known-working version
        wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O tools.zip

        unzip tools.zip
        mv cmdline-tools latest
        mkdir -p cmdline-tools
        mv latest cmdline-tools/

    - name: Install Android SDK Packages
      env:
        ANDROID_HOME: ${{ env.HOME }}/android-sdk
        PATH: ${{ env.HOME }}/android-sdk/cmdline-tools/latest/bin:${{ env.PATH }}
      run: |
        echo "Checking sdkmanager location..."
        which sdkmanager || { echo "sdkmanager not found!"; exit 1; }

        yes | sdkmanager --licenses
        sdkmanager --update

        sdkmanager \
          "platform-tools" \
          "platforms;android-34" \
          "build-tools;34.0.0"

    - name: Compress SDK
      run: |
        cd $HOME
        tar -czf android-sdk-linux-fixed.tar.gz android-sdk
        ls -lh android-sdk-linux-fixed.tar.gz

    - name: Upload to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: android-sdk-fixed
        name: Android SDK (Fixed Version)
        files: $HOME/android-sdk-linux-fixed.tar.gz
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
